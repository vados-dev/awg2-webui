<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWG 2.0 — Вход</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0d1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #c9d1d9;
  }

  .login-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 40px 48px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
  }

  .logo h1 {
    font-size: 22px;
    font-weight: 600;
    color: #e6edf3;
    letter-spacing: -0.3px;
  }

  .logo p {
    font-size: 13px;
    color: #8b949e;
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #8b949e;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 15px;
    transition: border-color 0.15s;
    outline: none;
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    border-color: #388bfd;
    box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.15);
  }

  .btn-login {
    width: 100%;
    padding: 11px;
    margin-top: 24px;
    background: linear-gradient(135deg, #238636, #2ea043);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
  }

  .btn-login:hover { opacity: 0.9; }
  .btn-login:active { transform: scale(0.98); }

  .error-box {
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid rgba(248, 81, 73, 0.4);
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 18px;
    font-size: 13px;
    color: #f85149;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #484f58;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <span class="logo-icon">🔐</span>
    <h1>AWG 2.0 Web UI</h1>
    <p id="login-subtitle">AmneziaWG Management Panel</p>
  </div>

  {% if error %}
  <div class="error-box">
    <span>⚠️</span> {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/login" autocomplete="off">
    <div class="form-group">
      <label for="username" id="label-username">Login</label>
      <input type="text" id="username" name="username" placeholder="admin"
             autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label for="password" id="label-password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••"
             autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="btn-login">Login →</button>
  </form>

  <div class="footer-note">AmneziaWG 2.0 · Secure VPN Management</div>
</div>

<script>
(function(){
  var lang = (function(){try{return localStorage.getItem('awg_lang')}catch(e){return null}})() || 'en';
  var i18n = {
    en: { subtitle:'AmneziaWG Management Panel', login:'Login', password:'Password', btn:'Login →' },
    ru: { subtitle:'Панель управления AmneziaWG', login:'Логин', password:'Пароль', btn:'Войти →' }
  };
  var t = i18n[lang] || i18n.en;
  document.getElementById('login-subtitle').textContent = t.subtitle;
  document.getElementById('label-username').textContent = t.login;
  document.getElementById('label-password').textContent = t.password;
  document.getElementById('btn-login').textContent = t.btn;
  document.documentElement.lang = lang;
})();
</script>
</body>
</html>
