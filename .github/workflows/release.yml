name: Release Docker image

on:
  push:
    branches: main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. dev-snapshot, v1.2.3-test)'
        required: true
        default: 'lts'

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: awg2-webui

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
          - platform: linux/arm/v7
            suffix: armv7
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},suffix=-${{ matrix.suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.suffix }}
            type=raw,value=${{ inputs.tag }}-${{ matrix.suffix }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

      - name: Enforce 15MB image size budget
        run: |
          set -euo pipefail
          FIRST_TAG=$(printf '%s\n' '${{ steps.meta.outputs.tags }}' | head -n1)
          SIZE_BYTES=$(docker buildx imagetools inspect "$FIRST_TAG" --raw \
            | jq '[.layers[].size] | add')
          SIZE_MB=$(awk "BEGIN { printf \"%.2f\", $SIZE_BYTES / 1048576 }")
          echo "Image $FIRST_TAG compressed size: ${SIZE_MB} MB"
          echo "- ${{ matrix.suffix }}: **${SIZE_MB} MB**" >> "$GITHUB_STEP_SUMMARY"
          if awk -v s="$SIZE_MB" 'BEGIN { exit !(s+0 > 15) }'; then
            echo "::error::Image exceeds 15MB budget (${SIZE_MB} MB)"
            exit 1
          fi
          if awk -v s="$SIZE_MB" 'BEGIN { exit !(s+0 > 12) }'; then
            echo "::warning::Image over 12MB soft warning (${SIZE_MB} MB)"
          fi

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create multi-arch manifests
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE="${{ inputs.tag }}"
          else
            BASE="${GITHUB_REF_NAME#v}"
          fi
          echo "Combining per-arch images for base: $BASE"
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "  -> $TAG"
            docker buildx imagetools create --tag "$TAG" \
              "${{ env.IMAGE }}:${BASE}-amd64" \
              "${{ env.IMAGE }}:${BASE}-arm64" \
              "${{ env.IMAGE }}:${BASE}-armv7"
          done <<< "${{ steps.meta.outputs.tags }}"
