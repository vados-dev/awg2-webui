name: Build & Push Multi-arch Docker Image

on:
  workflow_dispatch:
#    inputs:
#      build_platforms:
#        description: "Build platforms e.g. (linux/amd64,linux/arm64,linux/arm/v7)"
#        required: true
#        default: "linux/amd64,linux/arm/v7"
#        type: string
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  DEFAULT_BRANCH: main
  GITHUB_CONTAINER_PREFIX: ghcr.io
  DOCKER_IMAGE: awg2-webui
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build Docker
    runs-on: ${{ matrix.arch.os }}
    if: github.repository_owner == 'vados-dev'
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/arm/v7
            os: ubuntu-24.04-arm
          #- platform: linux/arm64
          #  os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
         ref: ${{ env.DEFAULT_BRANCH }}
         
      - name: Prepare
        run: |
          platform=${{ matrix.arch.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GITHUB_CONTAINER_PREFIX }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
          flavor: |
            latest=false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.arch.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GITHUB_CONTAINER_PREFIX }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.arch.platform }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.ref.name=${{ steps.meta.outputs.version }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

  
