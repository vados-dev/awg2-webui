name: Build & Push Multi-arch Docker Image

on:
  workflow_dispatch:
#    inputs:
#      build_platforms:
#        description: "Build platforms e.g. (linux/amd64,linux/arm64,linux/arm/v7)"
#        required: true
#        default: "linux/amd64,linux/arm/v7"
#        type: string
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
      - 'assets/**'
      - 'LICENSE'
      - 'NOTICE'

  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
      - 'assets/**'
      - 'LICENSE'
      - 'NOTICE'

env:
  DEFAULT_BRANCH: main
  REGISTRY: ghcr.io
  DOCKER_IMAGE: awg2-webui
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build Docker
    runs-on: ${{ matrix.arch.os }}
    if: github.repository_owner == 'vados-dev'
    permissions:
      packages: write
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/arm/v7
            os: ubuntu-24.04-arm
          #- platform: linux/arm64
          #  os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
         ref: ${{ env.DEFAULT_BRANCH }}
         
      - name: Prepare
        id: prepare
        run: |
          platform=${{ matrix.arch.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "REGISTRY_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        env:
          IMAGE: ${{ env.REGISTRY_IMAGE }}
        with:
          images: |
            ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=master-
          flavor: |
            latest=true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.arch.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.arch.platform }}
          tags: ${{ env.REGISTRY_IMAGE }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.ref.name=${{ steps.meta.outputs.version }}
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=true
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - docker-build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=master-
          flavor: |
            latest=true

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          n=3
          for i in $(seq 1 $n); do
            docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
              $(printf 'ghcr.io/wg-easy/wg-easy@sha256:%s ' *) && break

            [ "$i" = "$n" ] && exit 1
            sleep 10
          done

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
